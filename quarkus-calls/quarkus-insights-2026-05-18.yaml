title: Quarkus Insights Episode 248 - Introduction to Domain Driven Design & Hexagonal Architecture
description: |
    Build scalable monoliths with Quarkus, Domain-Driven Design, and Hexagonal Architecture!

    In this episode, Jeremy Davis builds a monolithic Quarkus application using DDD patterns like Entities, Value Objects, Aggregates, and Ports and Adapters. Then introduces coding agents and shows how DDD not only boosts clarity but also makes your architecture agentic-ready.

